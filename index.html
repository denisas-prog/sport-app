<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0c0c0b" id="metaTheme">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Salė">
<meta name="mobile-web-app-capable" content="yes">
<title>Salė</title>

<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #fafaf9;
  --bg-elev: #ffffff;
  --bg-sunken: #f4f4f2;
  --ink: #0a0a0a;
  --ink-2: #3f3f3e;
  --ink-3: #78766f;
  --ink-4: #b8b5ad;
  --line: #e7e5e0;
  --line-2: #efede8;
  --accent: #0a0a0a;
  --pr: #1a5d3a;
  --warn: #8a3a1a;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
@media (prefers-color-scheme: dark) {
  :root.auto {
    --bg: #0c0c0b;
    --bg-elev: #161614;
    --bg-sunken: #0a0a0a;
    --ink: #f5f4ef;
    --ink-2: #c8c5bd;
    --ink-3: #8a877f;
    --ink-4: #4d4a44;
    --line: #26241f;
    --line-2: #1d1b18;
    --accent: #f5f4ef;
    --pr: #7dd3a3;
    --warn: #d99a7a;
  }
}
:root.dark {
  --bg: #0c0c0b;
  --bg-elev: #161614;
  --bg-sunken: #0a0a0a;
  --ink: #f5f4ef;
  --ink-2: #c8c5bd;
  --ink-3: #8a877f;
  --ink-4: #4d4a44;
  --line: #26241f;
  --line-2: #1d1b18;
  --accent: #f5f4ef;
  --pr: #7dd3a3;
  --warn: #d99a7a;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior-y: none; }
body {
  font-family: 'Manrope', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
input, button, textarea, select {
  font: inherit;
  color: inherit;
  border: 0;
  background: transparent;
  outline: none;
}
button { cursor: pointer; }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

.serif { font-family: 'Fraunces', Georgia, serif; font-feature-settings: 'ss01' on; }
.mono-num { font-variant-numeric: tabular-nums; }

#app {
  min-height: 100%;
  padding-top: var(--safe-top);
  padding-bottom: calc(64px + var(--safe-bot));
  max-width: 600px;
  margin: 0 auto;
}

/* ===== Header ===== */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 22px 22px 8px;
}
.topbar h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-style: italic;
  font-size: 28px;
  margin: 0;
  letter-spacing: -0.01em;
}
.topbar .date {
  font-size: 13px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}

/* ===== Cards / sections ===== */
.section {
  padding: 0 22px;
  margin-top: 28px;
}
.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-3);
  margin: 0 0 10px;
  font-weight: 600;
}
.card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 18px;
}
.card + .card { margin-top: 10px; }

/* ===== Hero CTA on Today ===== */
.hero {
  margin: 14px 22px 0;
  padding: 28px 22px 26px;
  background: var(--ink);
  color: var(--bg);
  border-radius: 18px;
  position: relative;
  overflow: hidden;
}
.hero .hero-eyebrow {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  opacity: 0.55;
  font-weight: 600;
}
.hero .hero-title {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 300;
  font-size: 38px;
  line-height: 1.05;
  margin: 8px 0 18px;
  letter-spacing: -0.02em;
}
.hero .hero-title em { font-style: italic; font-weight: 400; }
.hero button.start {
  background: var(--bg);
  color: var(--ink);
  font-weight: 600;
  font-size: 15px;
  padding: 13px 18px;
  border-radius: 10px;
  width: 100%;
  letter-spacing: 0.01em;
}
.hero .resume-row {
  display: flex;
  gap: 8px;
}
.hero .resume-row button { flex: 1; }
.hero button.secondary {
  background: transparent;
  color: var(--bg);
  border: 1px solid rgba(255,255,255,0.25);
  font-weight: 500;
}

/* ===== Stats grid ===== */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.stat {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 12px;
}
.stat .num {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: 26px;
  line-height: 1;
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
}
.stat .lbl {
  font-size: 11px;
  color: var(--ink-3);
  margin-top: 6px;
  letter-spacing: 0.04em;
}

/* ===== Recent list ===== */
.recent-item {
  padding: 14px 0;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}
.recent-item:first-child { border-top: 0; }
.recent-item .ri-main { display: flex; flex-direction: column; gap: 2px; }
.recent-item .ri-title { font-weight: 600; font-size: 15px; }
.recent-item .ri-meta { font-size: 12px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
.recent-item .ri-vol {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 18px;
  font-variant-numeric: tabular-nums;
  color: var(--ink-2);
}
.recent-item .ri-vol small { font-size: 11px; color: var(--ink-3); margin-left: 2px; font-family: 'Manrope', sans-serif; }

/* ===== Bottom nav ===== */
.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter: saturate(1.4) blur(20px);
  -webkit-backdrop-filter: saturate(1.4) blur(20px);
  border-top: 1px solid var(--line);
  padding-bottom: var(--safe-bot);
  z-index: 50;
}
.tabbar-inner {
  max-width: 600px; margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
}
.tab {
  background: none;
  border: 0;
  padding: 14px 2px 12px;
  font-size: 11.5px;
  font-weight: 500;
  color: var(--ink-3);
  letter-spacing: 0;
  position: relative;
}
.tab.active { color: var(--ink); }
.tab.active::before {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 22px; height: 2px;
  background: var(--ink);
  border-radius: 0 0 2px 2px;
}

/* ===== Active workout ===== */
.workout-header {
  padding: 18px 22px 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.workout-header .timer {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 30px;
  font-weight: 300;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}
.workout-header button.finish {
  background: var(--ink);
  color: var(--bg);
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  border-radius: 999px;
}
.workout-header button.cancel {
  background: transparent;
  color: var(--ink-3);
  font-size: 13px;
  padding: 8px 10px;
}

.exercise-block {
  border-top: 1px solid var(--line);
  padding: 18px 22px 14px;
}
.exercise-block:first-of-type { border-top: 1px solid var(--line); margin-top: 8px; }
.eb-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 10px;
}
.eb-name {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: 21px;
  letter-spacing: -0.01em;
}
.eb-menu {
  color: var(--ink-3);
  font-size: 18px;
  padding: 4px 10px;
  border-radius: 8px;
}
.eb-menu:hover { background: var(--bg-sunken); }

.set-grid {
  display: grid;
  grid-template-columns: 36px 1fr 1fr 36px;
  gap: 8px;
  align-items: center;
  font-size: 13px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 600;
}
.set-grid .col-h { font-size: 11px; }
.set-row {
  display: grid;
  grid-template-columns: 36px 1fr 1fr 36px;
  gap: 8px;
  align-items: center;
  padding: 6px 0;
}
.set-row.done { opacity: 0.55; }
.set-row .idx {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 18px;
  color: var(--ink-3);
  text-align: center;
}
.set-row input.field {
  background: var(--bg-sunken);
  border-radius: 8px;
  padding: 11px 10px;
  font-size: 16px;
  font-weight: 500;
  text-align: center;
  font-variant-numeric: tabular-nums;
  width: 100%;
  border: 1px solid transparent;
}
.set-row input.field:focus { border-color: var(--ink-4); background: var(--bg-elev); }
.set-row .check {
  width: 30px; height: 30px;
  border: 1.5px solid var(--ink-4);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  margin-left: auto;
  background: var(--bg);
  font-size: 16px;
  color: transparent;
}
.set-row.done .check {
  background: var(--ink); color: var(--bg); border-color: var(--ink);
}
.set-row .pr-mark {
  position: absolute;
  font-family: 'Fraunces', serif;
  font-style: italic;
  color: var(--pr);
  font-size: 12px;
  margin-left: 4px;
}

.add-set, .add-exercise {
  width: 100%;
  margin-top: 8px;
  padding: 11px;
  border: 1px dashed var(--line);
  border-radius: 10px;
  font-size: 14px;
  color: var(--ink-3);
  font-weight: 500;
  background: transparent;
}
.add-set:hover, .add-exercise:hover { border-color: var(--ink-4); color: var(--ink-2); }
.add-exercise {
  margin: 18px 22px 24px;
  padding: 16px;
  font-size: 15px;
}

.last-time {
  font-size: 12px;
  color: var(--ink-3);
  margin-bottom: 10px;
  font-variant-numeric: tabular-nums;
}

/* ===== Modal / sheet ===== */
.sheet-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.sheet-bg.show { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  border-radius: 22px 22px 0 0;
  z-index: 101;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(.2,.8,.25,1);
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  padding-bottom: var(--safe-bot);
  max-width: 600px;
  margin: 0 auto;
}
.sheet.show { transform: translateY(0); }
.sheet-handle {
  width: 38px; height: 4px;
  background: var(--ink-4);
  border-radius: 4px;
  margin: 8px auto 6px;
  opacity: 0.5;
}
.sheet-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 22px 14px;
  border-bottom: 1px solid var(--line);
}
.sheet-head h2 {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-style: italic;
  font-size: 22px;
  margin: 0;
}
.sheet-head button {
  font-size: 14px;
  color: var(--ink-3);
  padding: 6px 8px;
}
.sheet-head button.primary { color: var(--ink); font-weight: 600; }
.sheet-body { overflow-y: auto; padding: 12px 22px 22px; flex: 1; }

/* Exercise picker */
.ex-search {
  width: 100%;
  background: var(--bg-sunken);
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 15px;
  margin: 4px 0 14px;
}
.ex-cat {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  font-weight: 600;
  margin: 18px 0 6px;
}
.ex-cat:first-child { margin-top: 4px; }
.ex-item {
  width: 100%;
  text-align: left;
  padding: 12px 4px;
  border-top: 1px solid var(--line-2);
  font-size: 15px;
  display: flex; justify-content: space-between; align-items: center;
}
.ex-item:first-of-type { border-top: 0; }
.ex-item small { color: var(--ink-3); font-size: 12px; }

/* History */
.hist-day {
  border-top: 1px solid var(--line);
  padding: 16px 22px;
}
.hist-day:first-child { border-top: 0; }
.hist-date {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  font-weight: 400;
  margin-bottom: 4px;
}
.hist-meta {
  font-size: 12px;
  color: var(--ink-3);
  margin-bottom: 10px;
  font-variant-numeric: tabular-nums;
}
.hist-ex {
  font-size: 13px;
  color: var(--ink-2);
  padding: 3px 0;
  display: flex;
  justify-content: space-between;
  font-variant-numeric: tabular-nums;
}
.hist-ex .he-name { color: var(--ink); }

/* Progress */
.chart-wrap {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px;
  margin-top: 10px;
}
.chart-wrap h3 {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-style: italic;
  font-size: 18px;
  margin: 0 0 4px;
}
.chart-wrap .chart-meta {
  font-size: 12px;
  color: var(--ink-3);
  margin-bottom: 12px;
  font-variant-numeric: tabular-nums;
}
.ex-picker {
  width: 100%;
  background: var(--bg-sunken);
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 15px;
  margin-bottom: 4px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.ex-picker .chev { color: var(--ink-3); font-size: 12px; }

svg.chart { width: 100%; height: 180px; display: block; }
svg.chart .axis { stroke: var(--line); stroke-width: 1; }
svg.chart .grid { stroke: var(--line-2); stroke-width: 1; stroke-dasharray: 2 3; }
svg.chart .line { stroke: var(--ink); stroke-width: 1.5; fill: none; }
svg.chart .dot { fill: var(--ink); }
svg.chart .dot-pr { fill: var(--pr); }
svg.chart text { fill: var(--ink-3); font-size: 10px; font-family: 'Manrope', sans-serif; font-variant-numeric: tabular-nums; }

.empty {
  text-align: center;
  padding: 40px 24px;
  color: var(--ink-3);
}
.empty .e-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--ink-2);
  margin-bottom: 6px;
  font-weight: 400;
}
.empty .e-text { font-size: 13px; }

/* Settings */
.list-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 22px;
  border-top: 1px solid var(--line);
  font-size: 15px;
}
.list-row:first-of-type { border-top: 0; }
.list-row .lr-val {
  color: var(--ink-3);
  font-size: 14px;
  font-variant-numeric: tabular-nums;
}
.list-row.button-row { cursor: pointer; }
.list-row.button-row:active { background: var(--bg-sunken); }
.list-row.danger .lr-name { color: var(--warn); }

.section-title-page {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-style: italic;
  font-size: 30px;
  letter-spacing: -0.01em;
  padding: 18px 22px 14px;
  margin: 0;
}

/* Rest timer overlay */
.rest-bar {
  position: fixed;
  left: 12px; right: 12px;
  bottom: calc(70px + var(--safe-bot));
  max-width: 576px; margin: 0 auto;
  background: var(--ink);
  color: var(--bg);
  border-radius: 14px;
  padding: 14px 18px;
  display: none;
  justify-content: space-between;
  align-items: center;
  z-index: 60;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}
.rest-bar.show { display: flex; }
.rest-bar .rb-time {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 24px;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}
.rest-bar .rb-actions { display: flex; gap: 6px; }
.rest-bar button {
  color: var(--bg);
  padding: 6px 10px;
  font-size: 13px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
}

/* Toast */
.toast {
  position: fixed;
  top: calc(20px + var(--safe-top));
  left: 50%;
  transform: translateX(-50%) translateY(-120%);
  background: var(--ink);
  color: var(--bg);
  padding: 11px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  z-index: 200;
  transition: transform 0.3s;
  box-shadow: 0 6px 18px rgba(0,0,0,0.2);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Backup modal */
#backupModal.show { display:flex !important; }
#backupModalBox { transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1); }
#backupModal.show #backupModalBox { transform: translateY(0); }
#backupModal.warn #backupModalExport { background: var(--warn); }

/* Note input */
textarea.notes {
  width: 100%;
  background: var(--bg-sunken);
  border-radius: 10px;
  padding: 12px;
  font-size: 14px;
  resize: vertical;
  min-height: 72px;
  margin: 8px 0;
}
.rating {
  display: flex; gap: 8px;
  margin: 10px 0 14px;
}
.rating button {
  flex: 1;
  padding: 12px 0;
  background: var(--bg-sunken);
  border-radius: 10px;
  font-family: 'Fraunces', serif;
  font-size: 18px;
}
.rating button.sel { background: var(--ink); color: var(--bg); }

/* Buttons in sheet */
button.cta {
  width: 100%;
  background: var(--ink);
  color: var(--bg);
  padding: 14px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  margin-top: 12px;
}
button.cta-2 {
  width: 100%;
  background: var(--bg-sunken);
  color: var(--ink);
  padding: 14px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  margin-top: 8px;
}

input.body-weight {
  background: var(--bg-sunken);
  padding: 14px;
  border-radius: 10px;
  font-size: 17px;
  width: 100%;
  text-align: center;
  font-variant-numeric: tabular-nums;
  font-family: 'Fraunces', serif;
  font-weight: 400;
}

/* Templates */
.tpl-card {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 8px;
}
.tpl-name {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 400;
  margin-bottom: 4px;
}
.tpl-ex {
  font-size: 12px;
  color: var(--ink-3);
  margin-bottom: 10px;
}
.tpl-actions { display: flex; gap: 8px; }
.tpl-actions button {
  flex: 1;
  padding: 9px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
}
.tpl-actions .use { background: var(--ink); color: var(--bg); }
.tpl-actions .del { background: var(--bg-sunken); color: var(--ink-2); }

.fab-add {
  display: block;
  width: 100%;
  margin: 14px 0 4px;
  padding: 14px;
  border: 1px dashed var(--line);
  border-radius: 12px;
  font-size: 14px;
  color: var(--ink-3);
  font-weight: 500;
}

/* ===== NUTRITION ===== */
.date-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 22px 4px;
}

/* v2.2: bendra migracija — naudojama ir loadState, ir importData */
function migrateState(s) {
  if (!s.exercises) s.exercises = [...DEFAULT_EXERCISES];
  if (!s.workouts) s.workouts = [];
  if (!s.templates) s.templates = [];
  if (!s.bodyWeight) s.bodyWeight = [];
  if (!s.settings) s.settings = {};
  if (s.settings.restDefault == null) s.settings.restDefault = 90;
  if (s.settings.weightStep == null) s.settings.weightStep = 2.5;
  if (!s.settings.theme) s.settings.theme = 'dark';
  if (s.settings.soundEnabled == null) s.settings.soundEnabled = true;
  // Nutrition migration
  if (!s.foods) s.foods = [...DEFAULT_FOODS];
  if (!s.foodEntries) s.foodEntries = [];
  if (!s.water) s.water = [];
  if (!s.nutritionTargets) s.nutritionTargets = { kcal: 2200, p: 130, c: 220, f: 65, water: 2000 };
  if (!s.profile) s.profile = { sex: null, age: null, height: null, activity: 'medium', goal: 'maintain' };
  if (!s.mealTemplates) s.mealTemplates = [];
  if (s.lastBackupTs == null) s.lastBackupTs = 0;
  return s;
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = migrateState(JSON.parse(raw));
      if (s.activeWorkout) activeWorkout = s.activeWorkout;
      return s;
    }
  } catch(e) { console.error(e); }
  return {
    exercises: [...DEFAULT_EXERCISES],
    workouts: [],
    templates: [],
    bodyWeight: [],
    foods: [...DEFAULT_FOODS],
    foodEntries: [],
    water: [],
    nutritionTargets: { kcal: 2200, p: 130, c: 220, f: 65, water: 2000 },
    profile: { sex: null, age: null, height: null, activity: 'medium', goal: 'maintain' },
    mealTemplates: [],
    lastBackupTs: 0,
    settings: { restDefault: 90, weightStep: 2.5, theme: 'dark', soundEnabled: true },
    activeWorkout: null
  };
}

function save() {
  state.activeWorkout = activeWorkout;
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {
    console.error('Saugojimo klaida:', e);
    // QuotaExceededError arba private mode
    const isQuota = e && (e.name === 'QuotaExceededError' || e.code === 22);
    if (typeof toast === 'function') {
      toast(isQuota ? '⚠ Atminties limitas — eksportuok ir trink seną' : '⚠ Nepavyko išsaugoti');
    } else {
      alert(isQuota
        ? 'Įrenginio atmintis pilna. Eksportuok duomenis (Daugiau → Eksportuoti) ir ištrink seniausias treniruotes.'
        : 'Nepavyko išsaugoti duomenų.');
    }
  }
}

const $ = (s, p=document) => p.querySelector(s);
const $$ = (s, p=document) => Array.from(p.querySelectorAll(s));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
/* v2.2: apsauga nuo HTML/atributų injekcijos per vartotojo įvestus tekstus */
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtDate(ts) {
  const d = new Date(ts);
  const days = ['Sek','Pir','Ant','Tre','Ket','Pen','Šeš'];
  const months = ['sausio','vasario','kovo','balandžio','gegužės','birželio','liepos','rugpjūčio','rugsėjo','spalio','lapkričio','gruodžio'];
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(ts); target.setHours(0,0,0,0);
  const diff = Math.round((today - target) / 86400000);
  if (diff === 0) return 'Šiandien';
  if (diff === 1) return 'Vakar';
  if (diff < 7 && diff > 0) return diff + ' d. atgal';
  return `${d.getDate()} ${months[d.getMonth()]}`;
}
function fmtFullDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('lt-LT', { weekday:'long', day:'numeric', month:'long' });
}
function fmtDuration(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function fmtSeconds(s) {
  if (!s) return '0:00';
  const m = Math.floor(s / 60), sec = s % 60;
  return m + ':' + String(sec).padStart(2,'0');
}
function fmtDurationLong(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  if (h > 0) return `${h}h ${m}min`;
  return `${m}min`;
}
function getExercise(id) {
  return state.exercises.find(e => e.id === id);
}
function totalVolume(workout) {
  let v = 0;
  for (const ex of workout.exercises) {
    for (const s of ex.sets) {
      if (s.done && s.weight && s.reps) v += s.weight * s.reps;
    }
  }
  return v;
}
function workoutDate(w) {
  return w.endTs || w.startTs;
}
function dayBucket(ts) {
  const d = new Date(ts);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function thisWeekStart() {
  const d = new Date(); d.setHours(0,0,0,0);
  const day = (d.getDay() + 6) % 7; // Mon = 0
  d.setDate(d.getDate() - day);
  return d.getTime();
}
function streakDays() {
  const days = new Set(state.workouts.map(w => dayBucket(workoutDate(w))));
  let n = 0;
  let d = new Date(); d.setHours(0,0,0,0);
  // Don't break streak if no workout today yet
  if (!days.has(dayBucket(d.getTime()))) d.setDate(d.getDate() - 1);
  while (days.has(dayBucket(d.getTime()))) {
    n++;
    d.setDate(d.getDate() - 1);
  }
  return n;
}
function workoutsThisWeek() {
  const start = thisWeekStart();
  return state.workouts.filter(w => workoutDate(w) >= start).length;
}
/* =====================================================================
   PROFILIO IR MAKRO SKAIČIAVIMAS
   ===================================================================== */
function latestBodyWeight() {
  return state.bodyWeight.length ? state.bodyWeight[state.bodyWeight.length-1].weight : null;
}
function calcBMI(weight, height) {
  if (!weight || !height) return null;
  const m = height / 100;
  return weight / (m * m);
}
function bmiCategory(bmi) {
  if (bmi == null) return '';
  if (bmi < 18.5) return 'nepakankamas';
  if (bmi < 25)   return 'normalus';
  if (bmi < 30)   return 'antsvoris';
  return 'nutukimas';
}
function calcBMR(profile, weight) {
  if (!profile?.sex || !profile?.age || !profile?.height || !weight) return null;
  const base = 10*weight + 6.25*profile.height - 5*profile.age;
  return profile.sex === 'm' ? base + 5 : base - 161;
}
function activityMult(level) {
  return ({ low: 1.375, medium: 1.55, high: 1.725 })[level] || 1.55;
}
function calcTDEE(profile, weight) {
  const bmr = calcBMR(profile, weight);
  if (!bmr) return null;
  return bmr * activityMult(profile.activity);
}
function suggestedTargets() {
  const w = latestBodyWeight();
  const tdee = calcTDEE(state.profile, w);
  if (!tdee) return null;
  let kcal = tdee;
  if (state.profile.goal === 'cut')  kcal -= 400;
  if (state.profile.goal === 'bulk') kcal += 250;
  const p = w * 1.8;
  const f = w * 0.9;
  const remainKcal = kcal - p*4 - f*9;
  const c = Math.max(50, remainKcal / 4);
  const round5 = n => Math.round(n / 5) * 5;
  const round10 = n => Math.round(n / 10) * 10;
  return {
    kcal: round10(kcal),
    p: round5(p),
    c: round5(c),
    f: round5(f),
    water: Math.round(w * 30 / 100) * 100,
    bmr: Math.round(calcBMR(state.profile, w)),
    tdee: Math.round(tdee)
  };
}
function profileComplete() {
  const p = state.profile;
  return !!(p.sex && p.age && p.height);
}

function bestSetForExercise(exId) {
  // Best = highest weight × reps (estimated 1RM via Epley)
  let best = null;
  for (const w of state.workouts) {
    for (const ex of w.exercises) {
      if (ex.exerciseId !== exId) continue;
      for (const s of ex.sets) {
        if (!s.done || !s.weight || !s.reps) continue;
        const e1rm = s.weight * (1 + s.reps / 30);
        if (!best || e1rm > best.e1rm) best = { ...s, e1rm, ts: workoutDate(w) };
      }
    }
  }
  return best;
}
function lastWorkoutForExercise(exId, beforeTs = Infinity) {
  for (let i = state.workouts.length - 1; i >= 0; i--) {
    const w = state.workouts[i];
    if (workoutDate(w) >= beforeTs) continue;
    const ex = w.exercises.find(e => e.exerciseId === exId);
    if (ex && ex.sets.some(s => s.done)) return { workout: w, exercise: ex };
  }
  return null;
}

function startRest(seconds) {
  seconds = seconds || state.settings.restDefault || 90;
  restEndAt = Date.now() + seconds * 1000;
  $('#restBar').classList.add('show');
  if (restTimer) clearInterval(restTimer);
  updateRestBar();
  restTimer = setInterval(updateRestBar, 250);
}
function updateRestBar() {
  const left = Math.max(0, Math.round((restEndAt - Date.now())/1000));
  $('#rbTime').textContent = fmtDuration(left);
  if (left <= 0) {
    clearInterval(restTimer);
    $('#restBar').classList.remove('show');
    if (navigator.vibrate) navigator.vibrate([200, 80, 200]);
    if (state.settings.soundEnabled) {
      try {
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        function pt(freq, gain, t) {
          const o = ac.createOscillator(), g = ac.createGain();
          o.connect(g); g.connect(ac.destination);
          o.type = 'sine'; o.frequency.value = freq;
          g.gain.setValueAtTime(gain, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
          o.start(t); o.stop(t + 0.45);
        }
        pt(880, 0.5, ac.currentTime);
        pt(1760, 0.2, ac.currentTime);
        pt(1100, 0.5, ac.currentTime + 0.35);
        pt(2200, 0.2, ac.currentTime + 0.35);
      } catch(e) {}
    }
  }
}
function restAdd(s) { restEndAt += s*1000; updateRestBar(); }
function toggleSound() { state.settings.soundEnabled = !state.settings.soundEnabled; save(); render(); }
function restSkip() {
  clearInterval(restTimer);
  $('#restBar').classList.remove('show');
}

/* ---------- ACTIVE WORKOUT ---------- */
function renderActiveWorkout(root) {
  const elapsed = Math.round((Date.now() - activeWorkout.startTs) / 1000);

  const exHtml = activeWorkout.exercises.map((ex, ei) => {
    const exDef = getExercise(ex.exerciseId);
    const lastTime = lastWorkoutForExercise(ex.exerciseId, activeWorkout.startTs);
    const isTime = (ex.setType ?? exDef?.setType) === 'time';
    const lastInfo = lastTime
      ? `Paskutinį kartą: ${lastTime.exercise.sets.filter(s=>s.done).map(s => s.duration != null ? fmtSeconds(s.duration) : `${s.reps}×${s.weight}kg`).join(', ')} · ${fmtDate(workoutDate(lastTime.workout))}`
      : 'Pirmas kartas';
    const setsHtml = ex.sets.map((s, si) => {
      if (isTime) {
        const running = s.timerRunning;
        const dur = s.duration || 0;
        return `
          <div class="set-row ${s.done ? 'done' : ''}" data-ei="${ei}" data-si="${si}" id="set-${ei}-${si}">
            <div class="idx">${si+1}</div>
            <div class="time-display mono-num" style="font-size:22px; font-weight:700; letter-spacing:1px; min-width:80px; text-align:center;">${fmtSeconds(dur)}</div>
            ${running
              ? `<button class="check" style="background:var(--warn); color:#fff;" onclick="stopSetTimer(${ei},${si})">■ Stop</button>`
              : (s.done
                  ? `<button class="check" onclick="toggleSetDone(${ei},${si})">✓</button>`
                  : `<button class="check" style="background:var(--accent,#111); color:#fff;" onclick="startSetTimer(${ei},${si})">▶ Start</button>`)
            }
          </div>
        `;
      } else {
        return `
          <div class="set-row ${s.done ? 'done' : ''}" data-ei="${ei}" data-si="${si}">
            <div class="idx">${si+1}</div>
            <input class="field" type="number" inputmode="decimal" step="any" placeholder="${(lastTime?.exercise.sets[si]?.reps) ?? '–'}" value="${s.reps ?? ''}" oninput="updateSet(${ei},${si},'reps',this.value)" onfocus="this.select()">
            <input class="field" type="number" inputmode="decimal" step="any" placeholder="${(lastTime?.exercise.sets[si]?.weight) ?? '–'}" value="${s.weight ?? ''}" oninput="updateSet(${ei},${si},'weight',this.value)" onfocus="this.select()">
            <button class="check" onclick="toggleSetDone(${ei},${si},${lastTime?.exercise.sets[si]?.reps ?? 'null'},${lastTime?.exercise.sets[si]?.weight ?? 'null'})">✓</button>
          </div>
        `;
      }
    }).join('');
    const colHeaders = isTime
      ? `<div></div><div class="col-h" style="grid-column:2/4;">Laikas</div><div></div>`
      : `<div></div><div class="col-h">Kart.</div><div class="col-h">Svoris kg</div><div></div>`;
    return `
      <div class="exercise-block" data-ei="${ei}">
        <div class="eb-head">
          <div class="eb-name">${esc(exDef?.name ?? 'Pratimas')}</div>
          <button class="eb-menu" onclick="exerciseMenu(${ei})">···</button>
        </div>
        <div class="last-time">${lastInfo}</div>
        <div class="set-grid">
          ${colHeaders}
        </div>
        ${setsHtml}
        <button class="add-set" onclick="addSet(${ei})">+ Pridėti seriją</button>
      </div>
    `;
  }).join('');

  root.innerHTML = `
    <div class="workout-header">
      <button class="cancel" onclick="discardWorkout()">Atmesti</button>
      <div class="timer mono-num" id="liveTimer">${fmtDuration(elapsed)}</div>
      <button class="finish" onclick="finishWorkoutSheet()">Užbaigti</button>
    </div>
    ${exHtml}
    <button class="add-exercise" onclick="openExercisePicker()">+ Pridėti pratimą</button>
  `;

  if (workoutTickerHandle) clearInterval(workoutTickerHandle);
  workoutTickerHandle = setInterval(() => {
    if (!activeWorkout || view !== 'today') return;
    const e = Math.round((Date.now() - activeWorkout.startTs)/1000);
    const t = $('#liveTimer'); if (t) t.textContent = fmtDuration(e);
  }, 1000);
}

function startNewWorkout() {
  activeWorkout = {
    id: uid(),
    startTs: Date.now(),
    exercises: [],
    notes: '',
    rating: null,
    templateId: null
  };
  save();
  openExercisePicker();
  render();
}
function continueWorkout() { render(); }
function discardWorkout() {
  if (!confirm('Atmesti šią treniruotę? Įvesti duomenys nebus išsaugoti.')) return;
  activeWorkout = null;
  if (workoutTickerHandle) clearInterval(workoutTickerHandle);
  save();
  render();
}
function addSet(ei) {
  const ex = activeWorkout.exercises[ei];
  const last = ex.sets[ex.sets.length - 1];
  ex.sets.push({ reps: last?.reps ?? null, weight: last?.weight ?? null, done: false });
  save();
  render();
}
function updateSet(ei, si, field, val) {
  const v = val === '' ? null : parseFloat(val);
  activeWorkout.exercises[ei].sets[si][field] = v;
  save();
}
let setTimerHandle = null;
function startSetTimer(ei, si) {
  const s = activeWorkout.exercises[ei].sets[si];
  if (s.timerRunning) return;
  s.timerRunning = true;
  s.timerStart = Date.now() - (s.duration || 0) * 1000;
  save();
  if (setTimerHandle) clearInterval(setTimerHandle);
  setTimerHandle = setInterval(() => {
    if (!activeWorkout) { clearInterval(setTimerHandle); return; }
    let found = false;
    activeWorkout.exercises.forEach((ex, ei2) => {
      ex.sets.forEach((set, si2) => {
        if (set.timerRunning) {
          found = true;
          set.duration = Math.floor((Date.now() - set.timerStart) / 1000);
          const el = document.getElementById('set-' + ei2 + '-' + si2);
          if (el) {
            const disp = el.querySelector('.time-display');
            if (disp) disp.textContent = fmtSeconds(set.duration);
          }
        }
      });
    });
    if (!found) clearInterval(setTimerHandle);
  }, 250);
  render();
}
function stopSetTimer(ei, si) {
  const s = activeWorkout.exercises[ei].sets[si];
  s.duration = Math.floor((Date.now() - s.timerStart) / 1000);
  s.timerRunning = false;
  s.done = true;
  clearInterval(setTimerHandle);
  save();
  startRest(state.settings.restDefault);
  if (navigator.vibrate) navigator.vibrate(40);
  render();
}
function toggleSetDone(ei, si, hintReps, hintWeight) {
  const s = activeWorkout.exercises[ei].sets[si];
  const ex = activeWorkout.exercises[ei];
  const exDef = getExercise(ex.exerciseId);
  const isTime = (ex.setType ?? exDef?.setType) === 'time';
  s.done = !s.done;
  // Auto-fill placeholder values if user confirmed without entering numbers
  if (s.done && !isTime) {
    if (s.reps == null && hintReps != null) s.reps = hintReps;
    if (s.weight == null && hintWeight != null) s.weight = hintWeight;
  }
  save();
  // Start rest after any done set (not just when reps+weight filled)
  if (s.done) {
    startRest(state.settings.restDefault);
    if (navigator.vibrate) navigator.vibrate(40);
  }
  render();
}
function exerciseMenu(ei) {
  const ex = activeWorkout.exercises[ei];
  const def = getExercise(ex.exerciseId);
  const isTime = (ex.setType ?? def?.setType) === 'time';
  const toggleLabel = isTime ? '2 - Perjungti į kg (kartojimai + svoris)' : '2 - Perjungti į laiką (laikmatis)';
  const choice = prompt(`${def.name}\n\n1 - Pašalinti pratimą\n${toggleLabel}\n3 - Atšaukti`, '3');
  if (choice === '1') {
    activeWorkout.exercises.splice(ei, 1);
    save();
    render();
  } else if (choice === '2') {
    ex.setType = isTime ? 'reps' : 'time'; // v2.2: keičiam tik šios treniruotės pratimą, ne globalų aprašą
    // Reset sets for new type
    ex.sets = ex.sets.map(() => ({ reps: null, weight: null, duration: null, timerRunning: false, done: false }));
    save();
    render();
  }
}

/* ---------- EXERCISE PICKER ---------- */
function openExercisePicker() {
  sheetCtx = { type: 'pickEx', filter: '' };
  openSheet('Pasirink pratimą', '', '');
  renderPickerBody();
}
function renderPickerBody() {
  const filter = (sheetCtx.filter || '').toLowerCase();
  const list = state.exercises.filter(e =>
    !filter || e.name.toLowerCase().includes(filter) || e.cat.toLowerCase().includes(filter)
  );
  const grouped = {};
  for (const e of list) { (grouped[e.cat] = grouped[e.cat] || []).push(e); }

  const recent = lastUsedExercises(6).filter(id => list.some(e => e.id === id));

  let body = `<input class="ex-search" id="exSearch" placeholder="Ieškoti pratimo..." value="${esc(sheetCtx.filter || '')}" oninput="sheetCtx.filter=this.value; renderPickerBody()">`;

  if (!filter && recent.length) {
    body += `<div class="ex-cat">Neseniai naudoti</div>`;
    for (const id of recent) {
      const e = getExercise(id);
      if (!e) continue;
      body += `<button class="ex-item" onclick="addExerciseToWorkout('${e.id}')">${esc(e.name)} <small>${esc(e.cat)}</small></button>`;
    }
  }

  for (const cat of CATEGORIES) {
    if (!grouped[cat]) continue;
    body += `<div class="ex-cat">${cat}</div>`;
    for (const e of grouped[cat]) {
      body += `<button class="ex-item" onclick="addExerciseToWorkout('${e.id}')">${esc(e.name)}</button>`;
    }
  }

  body += `<button class="fab-add" onclick="openCustomExerciseForm()">+ Pridėti naują pratimą</button>`;

  refreshSheetBody(body);
}
function lastUsedExercises(n=6) {
  const seen = new Set();
  const out = [];
  for (let i = state.workouts.length - 1; i >= 0; i--) {
    for (const ex of state.workouts[i].exercises) {
      if (!seen.has(ex.exerciseId)) {
        seen.add(ex.exerciseId);
        out.push(ex.exerciseId);
        if (out.length >= n) return out;
      }
    }
  }
  return out;
}
function addExerciseToWorkout(exId) {
  if (!activeWorkout) {
    activeWorkout = { id: uid(), startTs: Date.now(), exercises: [], notes: '', rating: null, templateId: null };
  }
  const last = lastWorkoutForExercise(exId);
  let starterSets = [{ reps: null, weight: null, done: false }];
  if (last) {
    starterSets = last.exercise.sets.map(s => ({ reps: null, weight: null, done: false }));
    if (starterSets.length === 0) starterSets = [{ reps: null, weight: null, done: false }];
  } else {
    starterSets = [{}, {}, {}].map(() => ({ reps: null, weight: null, done: false }));
  }
  activeWorkout.exercises.push({ exerciseId: exId, sets: starterSets });
  save();
  closeSheet();
  render();
}

function setRating(n) {
  activeWorkout.rating = n;
  $$('#ratingRow button').forEach(b => b.classList.toggle('sel', parseInt(b.dataset.r) === n));
}
function saveAsTemplatePrompt() {
  const name = prompt('Šablono pavadinimas:', activeWorkout.exercises.length ? getExercise(activeWorkout.exercises[0].exerciseId).cat : 'Mano šablonas');
  if (!name) return;
  state.templates.push({
    id: uid(),
    name,
    exerciseIds: activeWorkout.exercises.map(e => e.exerciseId),
    targetSets: activeWorkout.exercises.map(e => e.sets.length)
  });
  save();
  toast('Šablonas išsaugotas');
}
function commitWorkout() {
  const notes = $('#finishNotes')?.value || '';
  activeWorkout.notes = notes;
  activeWorkout.endTs = Date.now();
  // Filter out incomplete sets
  for (const ex of activeWorkout.exercises) {
    ex.sets = ex.sets.filter(s => s.done);
  }
  activeWorkout.exercises = activeWorkout.exercises.filter(e => e.sets.length > 0);
  if (activeWorkout.exercises.length === 0) {
    if (!confirm('Treniruotė tuščia. Vis tiek išsaugoti?')) return;
  }
  // PR detection
  const prs = detectPRs(activeWorkout);
  state.workouts.push(activeWorkout);
  activeWorkout = null;
  if (workoutTickerHandle) clearInterval(workoutTickerHandle);
  save();
  closeSheet();
  if (prs.length) {
    toast(`🏆 Naujas rekordas: ${prs[0]}${prs.length>1?` (+${prs.length-1})`:''}`);
  }
  setView('today');
  setTimeout(() => showBackupModal(true), 400);
}
function detectPRs(workout) {
  const prs = [];
  for (const ex of workout.exercises) {
    for (const s of ex.sets) {
      if (!s.done || !s.weight || !s.reps) continue;
      const e1rm = s.weight * (1 + s.reps / 30);
      // Check against history (excluding current)
      let prev = 0;
      for (const w of state.workouts) {
        for (const exh of w.exercises) {
          if (exh.exerciseId !== ex.exerciseId) continue;
          for (const sh of exh.sets) {
            if (sh.done && sh.weight && sh.reps) {
              const v = sh.weight * (1 + sh.reps/30);
              if (v > prev) prev = v;
            }
          }
        }
      }
      if (e1rm > prev) {
        prs.push(getExercise(ex.exerciseId)?.name);
        break;
      }
    }
  }
  return [...new Set(prs)];
}

  openSheetRaw();
}

function startEditWorkout(id) {
  const w = state.workouts.find(x => x.id === id);
  if (!w) return;
  const dateStr = dayBucket(w.startTs); // v2.2: lokali data, ne UTC (poslinkis po vidurnakčio)
  const durationMin = Math.max(1, Math.round((w.endTs - w.startTs) / 60000));
  retroWorkout = {
    id: w.id,
    isEdit: true,
    date: dateStr,
    durationMin: durationMin,
    exercises: w.exercises.map(function(ex) {
      return {
        exerciseId: ex.exerciseId,
        sets: ex.sets.map(function(s) { return { reps: s.reps, weight: s.weight, duration: s.duration ?? null, done: s.done !== false }; })
      };
    }),
    notes: w.notes || '',
    rating: w.rating || null
  };
  closeSheet();
  renderRetroView();
}

function startRetroWorkout() {

            '<input class="field" type="number" inputmode="decimal" step="any" placeholder="kg" value="' + (s.weight ?? '') + '" oninput="updateRetroSet(' + ei + ',' + si + ',\'weight\',this.value)" onfocus="this.select()">') +

function updateRetroSet(ei, si, field, val) {

}

function toggleRetroSetDone(ei, si) {

  renderRetroView();
}

function addRetroSet(ei) {
  const ex = retroWorkout.exercises[ei];
  const last = ex.sets[ex.sets.length - 1];
  ex.sets.push({ reps: last ? last.reps : null, weight: last ? last.weight : null, done: false });
  renderRetroView();
}

function retroExerciseMenu(ei) {

  const choice = prompt((def ? def.name : 'Pratimas') + '\n\n1 - Pašalinti pratimą\n2 - Atšaukti', '2');

function discardRetroWorkout() {

}

function finishRetroWorkoutSheet() {
  var anyDone = retroWorkout.exercises.some(function(ex) { return ex.sets.some(function(s) { return s.done; }); });
  if (!anyDone) {
    if (!confirm('Nei viena serija nepažymėta. Vis tiek išsaugoti?')) return;
  }
  sheetCtx = { type: 'retroFinish' };
  document.getElementById('sheetTitle').textContent = 'Išsaugoti treniruotę';
  document.getElementById('sheetAction').textContent = '';
  document.getElementById('sheetAction').onclick = null;
  var vol = totalVolume(retroWorkout);
  var sets = retroWorkout.exercises.reduce(function(a,e) { return a + e.sets.filter(function(s) { return s.done; }).length; }, 0);
  document.getElementById('sheetBody').innerHTML =

function setRetroRating(n) {
  retroWorkout.rating = n;
  var btns = document.querySelectorAll('#retroRatingRow button');
  btns.forEach(function(b) { b.classList.toggle('sel', parseInt(b.dataset.r) === n); });
}

function commitRetroWorkout() {
  var notes = (document.getElementById('retroNotes') || {}).value || '';
  retroWorkout.notes = notes;

  var parts = retroWorkout.date.split('-').map(Number);
  var startDate = new Date(parts[0], parts[1] - 1, parts[2], 9, 0, 0);
  var startTs = startDate.getTime();
  var endTs = startTs + (retroWorkout.durationMin * 60 * 1000);

  for (var i = 0; i < retroWorkout.exercises.length; i++) {
    retroWorkout.exercises[i].sets = retroWorkout.exercises[i].sets.filter(function(s) { return s.done; });
  }
  retroWorkout.exercises = retroWorkout.exercises.filter(function(e) { return e.sets.length > 0; });

  if (retroWorkout.exercises.length === 0) {
    if (!confirm('Treniruotė tuščia. Vis tiek išsaugoti?')) return;
  }

  var workout = {
    id: retroWorkout.id,
    startTs: startTs,
    endTs: endTs,
    exercises: retroWorkout.exercises,
    notes: retroWorkout.notes,
    rating: retroWorkout.rating,
    templateId: null
  };

  var prs = detectPRs(workout);
  if (retroWorkout.isEdit) {
    var idx = state.workouts.findIndex(function(x) { return x.id === retroWorkout.id; });
    if (idx !== -1) {
      state.workouts[idx] = workout;
    } else {
      state.workouts.push(workout);
    }
  } else {
    state.workouts.push(workout);
  }
  retroWorkout = null;
  save();
  closeSheet();
  if (prs.length) {
    toast('Rekordas: ' + prs[0] + (prs.length > 1 ? ' (+' + (prs.length - 1) + ')' : ''));
  } else {
    toast(idx !== undefined && idx !== -1 ? 'Treniruotė atnaujinta' : 'Treniruotė išsaugota');
  }
  setView('history');
}

function computeWeeklyVolume() {
  const buckets = {};
  for (const w of state.workouts) {
    const d = new Date(workoutDate(w));
    const day = (d.getDay() + 6) % 7;
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() - day);
    const key = d.getTime();
    buckets[key] = (buckets[key] || 0) + totalVolume(w);
  }
  // Last 8 weeks
  const out = [];
  const now = new Date(); now.setHours(0,0,0,0);
  const day = (now.getDay() + 6) % 7;
  now.setDate(now.getDate() - day);
  for (let i = 7; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate() - i*7);
    out.push({ ts: d.getTime(), value: buckets[d.getTime()] || 0 });
  }
  return out;
}

function renderLineChart(data, opts={}) {
  if (!data || data.length < 2) {
    return `<div style="height:180px; display:flex; align-items:center; justify-content:center; color:var(--ink-3); font-size:13px;">Reikia bent 2 įrašų grafikui</div>`;
  }
  const w = 320, h = 180, pad = { l: 36, r: 12, t: 14, b: 26 };
  const xs = data.map(d => d.x), ys = data.map(d => d.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const yPad = (yMax - yMin) * 0.15 || 1;
  const yLo = yMin - yPad, yHi = yMax + yPad;
  const sx = x => pad.l + (x - xMin)/(xMax - xMin || 1) * (w - pad.l - pad.r);
  const sy = y => pad.t + (1 - (y - yLo)/(yHi - yLo || 1)) * (h - pad.t - pad.b);
  const max = ys.reduce((a,b) => b > a ? b : a, -Infinity);

  const path = data.map((d,i) => `${i===0?'M':'L'}${sx(d.x).toFixed(1)},${sy(d.y).toFixed(1)}`).join(' ');
  const dots = data.map(d => `<circle class="${d.y === max ? 'dot-pr' : 'dot'}" cx="${sx(d.x).toFixed(1)}" cy="${sy(d.y).toFixed(1)}" r="${d.y === max ? 3.5 : 2.5}"/>`).join('');
  const fmt = opts.format || (v => v);
  // Y axis labels
  const yTicks = [yLo + (yHi-yLo)*0.0, yLo + (yHi-yLo)*0.5, yLo + (yHi-yLo)*1.0];
  const yLabels = yTicks.map(v => `<text x="${pad.l - 6}" y="${sy(v) + 3}" text-anchor="end">${fmt(v)}</text><line class="grid" x1="${pad.l}" x2="${w-pad.r}" y1="${sy(v)}" y2="${sy(v)}"/>`).join('');
  // X axis labels (first, last)
  const fmtX = ts => { const d = new Date(ts); return `${d.getDate()}/${d.getMonth()+1}`; };
  const xLabels = `<text x="${pad.l}" y="${h-8}" text-anchor="start">${fmtX(xMin)}</text><text x="${w-pad.r}" y="${h-8}" text-anchor="end">${fmtX(xMax)}</text>`;

  return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${yLabels}
    <path class="line" d="${path}"/>
    ${dots}
    ${xLabels}
  </svg>`;
}

function renderBarChart(data) {
  if (!data || !data.length) return '';
  const w = 320, h = 180, pad = { l: 36, r: 12, t: 14, b: 26 };
  const max = Math.max(...data.map(d => d.value), 1);
  const bw = (w - pad.l - pad.r) / data.length * 0.7;
  const gap = (w - pad.l - pad.r) / data.length;
  const bars = data.map((d, i) => {
    const x = pad.l + gap*i + (gap-bw)/2;
    const bh = (d.value / max) * (h - pad.t - pad.b);
    const y = h - pad.b - bh;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="var(--ink)" opacity="${d.value > 0 ? 1 : 0.15}"/>`;
  }).join('');
  const fmtX = ts => { const d = new Date(ts); return `${d.getDate()}/${d.getMonth()+1}`; };
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <text x="${pad.l-6}" y="${pad.t + 6}" text-anchor="end">${Math.round(max)}</text>
    <text x="${pad.l-6}" y="${h-pad.b}" text-anchor="end">0</text>
    <line class="axis" x1="${pad.l}" x2="${w-pad.r}" y1="${h-pad.b}" y2="${h-pad.b}"/>
    ${bars}
    <text x="${pad.l}" y="${h-8}" text-anchor="start">${fmtX(data[0].ts)}</text>
    <text x="${w-pad.r}" y="${h-8}" text-anchor="end">${fmtX(data[data.length-1].ts)}</text>
  </svg>`;
}

/* ---------- NUTRITION ---------- */
let nutritionDate = null; // ms timestamp of midnight, null = today

function getNutritionDay() {
  if (nutritionDate) return new Date(nutritionDate);
  const d = new Date(); d.setHours(0,0,0,0);
  return d;
}
function entriesForDay(dayStart) {
  const start = dayStart.getTime();
  const end = start + 86400000;
  return state.foodEntries.filter(e => e.ts >= start && e.ts < end);
}
function waterForDay(dayStart) {
  const start = dayStart.getTime();
  const end = start + 86400000;
  return state.water.filter(w => w.ts >= start && w.ts < end).reduce((a,b) => a + b.ml, 0);
}
function getFood(id) { return state.foods.find(f => f.id === id); }
function calcEntryMacros(entry) {
  const food = getFood(entry.foodId);
  if (!food) return { kcal: 0, p: 0, c: 0, f: 0 };
  const k = entry.amount / 100;
  return {
    kcal: food.kcal * k,
    p: food.p * k,
    c: food.c * k,
    f: food.f * k
  };
}
function dayTotals(entries) {
  const t = { kcal: 0, p: 0, c: 0, f: 0 };
  for (const e of entries) {
    const m = calcEntryMacros(e);
    t.kcal += m.kcal; t.p += m.p; t.c += m.c; t.f += m.f;
  }
  return t;
}
function fmtNum(n, decimals=0) {
  if (n == null || isNaN(n)) return '0';
  return n.toFixed(decimals);
}

function renderNutrition(root) {
  const day = getNutritionDay();
  const isToday = day.getTime() === new Date().setHours(0,0,0,0);
  const isFuture = day.getTime() > new Date().setHours(0,0,0,0);
  const entries = entriesForDay(day);
  const totals = dayTotals(entries);
  const targets = state.nutritionTargets;
  const water = waterForDay(day);

  const dayLabel = (() => {
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((today - day) / 86400000);
    if (diff === 0) return 'Šiandien';
    if (diff === 1) return 'Vakar';
    if (diff === -1) return 'Rytoj';
    return day.toLocaleDateString('lt-LT', { weekday:'long', day:'numeric', month:'long' });
  })();

  const kcalPct = Math.min(100, Math.round((totals.kcal / targets.kcal) * 100));
  const kcalOver = totals.kcal > targets.kcal;

  const macroBar = (val, target) => {
    const pct = Math.min(100, (val / target) * 100);
    const over = val > target;
    return `<div class="mr-mini-bar"><div class="${over?'over':''}" style="width:${pct.toFixed(0)}%"></div></div>`;
  };

  // Meals
  let mealsHtml = '';
  for (const meal of MEALS) {
    const mEntries = entries.filter(e => e.meal === meal.id);
    const mTotal = dayTotals(mEntries);
    const entriesHtml = mEntries.map(e => {
      const food = getFood(e.foodId);
      if (!food) return '';
      const m = calcEntryMacros(e);
      return `<div class="food-entry">
        <div class="fe-main">
          <div class="fe-name">${esc(food.name)}</div>
          <div class="fe-meta">${e.amount}g · ${fmtNum(m.p,0)}P · ${fmtNum(m.c,0)}C · ${fmtNum(m.f,0)}F</div>
        </div>
        <div class="fe-kcal">${Math.round(m.kcal)}<small>kcal</small></div>
        <button class="fe-del" onclick="deleteFoodEntry('${e.id}')">×</button>
      </div>`;
    }).join('');
    mealsHtml += `
      <div class="meal-block">
        <div class="meal-head">
          <div class="meal-name">${meal.name}</div>
          <div class="meal-kcal">${Math.round(mTotal.kcal)} kcal</div>
        </div>
        <div class="card" style="padding: 4px 14px;">
          ${entriesHtml}
          <button class="add-food" onclick="openFoodPicker('${meal.id}')">+ Pridėti maistą</button>
          ${mEntries.length >= 2 ? `<button class="add-food" style="margin-top:4px; font-size:12px;" onclick="saveMealAsTemplate('${meal.id}', ${day.getTime()})">Išsaugoti kaip šabloną</button>` : ''}
        </div>
      </div>
    `;
  }

  // Protein advice (if body weight known)
  let advice = '';
  const lastBw = state.bodyWeight[state.bodyWeight.length-1];
  if (lastBw && isToday) {
    const minP = Math.round(lastBw.weight * 1.6);
    const maxP = Math.round(lastBw.weight * 2.2);
    const status = totals.p >= minP ? '✓' : `dar reikia ${Math.round(minP - totals.p)}g`;
    advice = `<div class="advice-card">
      <strong>Baltymai jėgos sportui:</strong> ${minP}–${maxP}g/d. (${lastBw.weight}kg × 1.6–2.2)<br>
      Šiandien: ${Math.round(totals.p)}g — ${status}
    </div>`;
  }

  // Water dots (1 dot = 250ml, max 8 dots)
  const waterTarget = targets.water;
  const dotsCount = Math.max(8, Math.ceil(waterTarget/250));
  const filledDots = Math.round(water/250);
  let waterDots = '';
  for (let i = 0; i < dotsCount; i++) {
    waterDots += `<div class="wd ${i < filledDots ? 'full':''}"></div>`;
  }

  root.innerHTML = `
    <div class="date-nav">
      <button onclick="changeNutritionDate(-1)">‹</button>
      <div class="dn-label">${dayLabel}</div>
      <button onclick="changeNutritionDate(1)" ${isFuture ? 'disabled' : ''}>›</button>
    </div>

    <div class="macro-summary">
      <div class="ms-kcal">
        <div class="ms-num">${Math.round(totals.kcal)}<em style="font-size:20px; color:var(--ink-3);"> / ${targets.kcal}</em></div>
        <div class="ms-target">kcal</div>
      </div>
      <div class="ms-bar"><div class="ms-bar-fill ${kcalOver?'over':''}" style="width:${kcalPct}%"></div></div>
      <div class="macro-row">
        <div class="mr-cell">
          <div class="mr-name">Baltymai</div>
          <div class="mr-val">${fmtNum(totals.p,0)}<small>/${targets.p}g</small></div>
          ${macroBar(totals.p, targets.p)}
        </div>
        <div class="mr-cell">
          <div class="mr-name">Angliav.</div>
          <div class="mr-val">${fmtNum(totals.c,0)}<small>/${targets.c}g</small></div>
          ${macroBar(totals.c, targets.c)}
        </div>
        <div class="mr-cell">
          <div class="mr-name">Riebalai</div>
          <div class="mr-val">${fmtNum(totals.f,0)}<small>/${targets.f}g</small></div>
          ${macroBar(totals.f, targets.f)}
        </div>
      </div>
    </div>

    ${advice}

    ${mealsHtml}

    <div class="water-block">
      <div class="wb-head">
        <div class="wb-name">Vanduo</div>
        <div class="wb-amount">${water}<small> / ${waterTarget} ml</small></div>
      </div>
      <div class="water-dots">${waterDots}</div>
      <div class="water-buttons">
        <button onclick="addWater(${day.getTime()}, 250)">+250 ml</button>
        <button onclick="addWater(${day.getTime()}, 500)">+500 ml</button>
        <button onclick="addWater(${day.getTime()}, 750)">+750 ml</button>
      </div>
      ${water > 0 ? `<button class="water-undo" onclick="undoWater(${day.getTime()})">Atšaukti paskutinį</button>` : ''}
    </div>

    <div style="height: 24px"></div>
  `;
}

function changeNutritionDate(delta) {
  const cur = nutritionDate || new Date().setHours(0,0,0,0);
  const d = new Date(cur);
  d.setDate(d.getDate() + delta);
  d.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  if (d.getTime() > today.getTime()) return;
  nutritionDate = d.getTime() === today.getTime() ? null : d.getTime();
  render();
}

function deleteFoodEntry(id) {
  state.foodEntries = state.foodEntries.filter(e => e.id !== id);
  save();
  render();
}

function addWater(dayTs, ml) {
  // Add water at the appropriate timestamp (use current time if today, day start otherwise)
  const today = new Date().setHours(0,0,0,0);
  const ts = dayTs === today ? Date.now() : (dayTs + 12*3600*1000);
  state.water.push({ ts, ml });
  save();
  if (navigator.vibrate) navigator.vibrate(20);
  render();
}
function undoWater(dayTs) {
  const start = dayTs;
  const end = dayTs + 86400000;
  // Find latest water entry for this day
  let latest = -1, latestTs = -Infinity;
  state.water.forEach((w, i) => {
    if (w.ts >= start && w.ts < end && w.ts > latestTs) {
      latest = i; latestTs = w.ts;
    }
  });
  if (latest >= 0) {
    state.water.splice(latest, 1);
    save();
    render();
  }
}

/* ---------- FOOD PICKER ---------- */
let foodPickerCtx = null; // { meal, filter, cat }

function openFoodPicker(mealId) {
  foodPickerCtx = { meal: mealId, filter: '', cat: 'all' };
  $('#sheetTitle').textContent = 'Pasirink maistą';
  $('#sheetAction').textContent = '';
  $('#sheetAction').onclick = null;
  renderFoodPickerBody();
  openSheetRaw();
  setTimeout(() => $('#foodSearch')?.focus(), 100);
}

function renderFoodPickerBody() {
  const { filter, cat } = foodPickerCtx;
  const filterLow = filter.toLowerCase();
  let list = state.foods;
  if (cat !== 'all') list = list.filter(f => f.cat === cat);
  if (filterLow) list = list.filter(f => f.name.toLowerCase().includes(filterLow) || f.cat.toLowerCase().includes(filterLow));

  // Recent foods
  const recentIds = [];
  const seen = new Set();
  for (let i = state.foodEntries.length - 1; i >= 0 && recentIds.length < 8; i--) {
    if (!seen.has(state.foodEntries[i].foodId)) {
      seen.add(state.foodEntries[i].foodId);
      recentIds.push(state.foodEntries[i].foodId);
    }
  }

  const cats = ['all', ...FOOD_CATS];
  let html = `<input class="ex-search" id="foodSearch" placeholder="Ieškoti maisto..." value="${esc(filter)}" oninput="foodPickerCtx.filter=this.value; renderFoodPickerBody()">`;
  html += `<div class="food-cat-tab">`;
  for (const c of cats) {
    html += `<button class="${c===cat?'active':''}" onclick="foodPickerCtx.cat='${c}'; renderFoodPickerBody()">${c==='all'?'Viskas':c}</button>`;
  }
  html += `</div>`;

  if (cat === 'all' && !filter && state.mealTemplates.length) {
    html += `<div class="ex-cat">Šablonai</div>`;
    for (const t of state.mealTemplates) {
      const totalKcal = t.items.reduce((sum, it) => {
        const f = getFood(it.foodId);
        return sum + (f ? f.kcal * it.amount / 100 : 0);
      }, 0);
      const totalP = t.items.reduce((sum, it) => {
        const f = getFood(it.foodId);
        return sum + (f ? f.p * it.amount / 100 : 0);
      }, 0);
      html += `<button class="ex-item" onclick="applyMealTemplate('${t.id}')" style="background:var(--bg-sunken); border-radius:10px; margin-bottom:6px; padding:12px;">
        <div style="flex:1; min-width:0;">
          <div style="font-weight:500;">${esc(t.name)}</div>
          <small>${t.items.length} produktai · ${Math.round(totalKcal)} kcal · ${Math.round(totalP)}g baltymų</small>
        </div>
      </button>`;
    }
    html += `<div style="margin-bottom:14px;"></div>`;
  }

  if (cat === 'all' && !filter && recentIds.length) {
    html += `<div class="ex-cat">Neseniai</div>`;
    for (const id of recentIds) {
      const f = getFood(id); if (!f) continue;
      html += renderFoodItem(f);
    }
    html += `<div class="ex-cat" style="margin-top:18px;">Visi</div>`;
  }

  // Group by category if no filter, otherwise flat list
  if (filter || cat !== 'all') {
    for (const f of list) html += renderFoodItem(f);
  } else {
    const grouped = {};
    for (const f of list) (grouped[f.cat] = grouped[f.cat] || []).push(f);
    for (const c of FOOD_CATS) {
      if (!grouped[c]) continue;
      html += `<div class="ex-cat">${c}</div>`;
      for (const f of grouped[c]) html += renderFoodItem(f);
    }
  }

  if (list.length === 0) {
    html += `<div style="color:var(--ink-3); padding:14px 0; text-align:center; font-size:13px;">Nieko nerasta. Sukurk savo produktą:</div>`;
  }

  html += `<button class="fab-add" onclick="openCustomFoodForm()">+ Pridėti naują produktą</button>`;
  refreshSheetBody(html);
}

function renderFoodItem(f) {
  return `<button class="ex-item" onclick="openAmountSheet('${f.id}')">
    <div style="flex:1; min-width:0;">
      <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(f.name)}</div>
      <small>${f.kcal} kcal · ${f.p}P · ${f.c}C · ${f.f}F / 100g</small>

  </button>`;
}

let amountCtx = null; // { foodId, mealId, amount }

    </div>

      <div class="lm-cell"><div class="lm-num">${m.p.toFixed(1)}</div><div class="lm-lbl">Baltymai</div></div>
      <div class="lm-cell"><div class="lm-num">${m.c.toFixed(1)}</div><div class="lm-lbl">Angliav.</div></div>
      <div class="lm-cell"><div class="lm-num">${m.f.toFixed(1)}</div><div class="lm-lbl">Riebalai</div></div>
    </div>
    <div class="ex-cat">Patiekalas</div>
    <div class="meal-select" id="mealSelect">
      ${MEALS.map(m => `<button class="${m.id===amountCtx.mealId?'sel':''}" onclick="amountCtx.mealId='${m.id}'; renderAmountSheetBody()">${m.name}</button>`).join('')}
    </div>

function setAmount(v) {
  amountCtx.amount = v;
  $('#amountInput').value = v;
  updateAmountLive();
}
function updateAmountLive() {
  const food = getFood(amountCtx.foodId);
  const a = amountCtx.amount || 0;
  const k = a / 100;
  const lm = $('#liveMacros');
  if (!lm) return;
  lm.innerHTML = `
    <div class="lm-cell"><div class="lm-num">${Math.round(food.kcal*k)}</div><div class="lm-lbl">kcal</div></div>
    <div class="lm-cell"><div class="lm-num">${(food.p*k).toFixed(1)}</div><div class="lm-lbl">Baltymai</div></div>
    <div class="lm-cell"><div class="lm-num">${(food.c*k).toFixed(1)}</div><div class="lm-lbl">Angliav.</div></div>
    <div class="lm-cell"><div class="lm-num">${(food.f*k).toFixed(1)}</div><div class="lm-lbl">Riebalai</div></div>
  `;
}
function confirmAddFood() {
  const a = amountCtx.amount;
  if (!a || a <= 0) { toast('Įvesk gramus'); return; }
  // Use selected day for the entry (if viewing past day, log there; else now)
  const day = getNutritionDay();
  const today = new Date(); today.setHours(0,0,0,0);
  const ts = day.getTime() === today.getTime() ? Date.now() : (day.getTime() + 12*3600*1000);
  state.foodEntries.push({
    id: uid(),
    ts,
    foodId: amountCtx.foodId,
    amount: a,
    meal: amountCtx.mealId
  });
  save();
  closeSheet();
  render();
  toast('Pridėta');
  if (navigator.vibrate) navigator.vibrate(20);
}

/* ---------- MEAL TEMPLATES ---------- */
function saveMealAsTemplate(mealId, dayMs) {
  const day = new Date(dayMs); day.setHours(0,0,0,0);
  const entries = entriesForDay(day).filter(e => e.meal === mealId);
  if (entries.length === 0) { toast('Patiekalas tuščias'); return; }

  const meal = MEALS.find(m => m.id === mealId);
  const defaultName = `Mano ${meal.name.toLowerCase()}`;
  const name = prompt('Šablono pavadinimas:', defaultName);
  if (!name || !name.trim()) return;

  state.mealTemplates.push({
    id: uid(),
    name: name.trim(),
    items: entries.map(e => ({ foodId: e.foodId, amount: e.amount }))
  });
  save();
  render();
  toast('Šablonas išsaugotas');
}

function applyMealTemplate(templateId) {
  const t = state.mealTemplates.find(x => x.id === templateId);
  if (!t) { toast('Šablonas nerastas'); return; }
  const mealId = foodPickerCtx.meal;
  const day = getNutritionDay();
  const today = new Date(); today.setHours(0,0,0,0);
  const baseTs = day.getTime() === today.getTime() ? Date.now() : (day.getTime() + 12*3600*1000);

  let added = 0, missing = 0;
  for (let i = 0; i < t.items.length; i++) {
    const it = t.items[i];
    if (!getFood(it.foodId)) { missing++; continue; }
    state.foodEntries.push({
      id: uid(),
      ts: baseTs + i,
      foodId: it.foodId,
      amount: it.amount,
      meal: mealId
    });
    added++;
  }
  save();
  closeSheet();
  render();
  if (missing > 0) {
    toast(`Pridėta ${added} prod. (${missing} dingę)`);
  } else {
    toast(`Pridėta ${added} prod.`);
  }
  if (navigator.vibrate) navigator.vibrate(20);
}

function deleteMealTemplate(id) {
  if (!confirm('Trinti šabloną?')) return;
  state.mealTemplates = state.mealTemplates.filter(t => t.id !== id);
  save();
  render();
}

function saveCustomFood() {
  const name = $('#cfName').value.trim();
  const cat = $('#cfCat').value;
  const kcal = parseFloat($('#cfKcal').value) || 0;
  const p = parseFloat($('#cfP').value) || 0;
  const c = parseFloat($('#cfC').value) || 0;
  const f = parseFloat($('#cfF').value) || 0;
  if (!name) { toast('Įvesk pavadinimą'); return; }
  if (kcal === 0 && p === 0 && c === 0 && f === 0) { toast('Įvesk makro reikšmes'); return; }
  const id = 'cust-f-' + uid();
  state.foods.push({ id, name, cat, kcal, p, c, f, custom: true });
  save();
  toast('Produktas pridėtas');
  // Open amount sheet for the new food
  if (foodPickerCtx) {
    openAmountSheet(id);
  } else {
    closeSheet();
  }
}

function themeLabel(t) {
  return { auto: 'Auto', light: 'Šviesi', dark: 'Tamsi' }[t] || 'Auto';
}
function cycleTheme() {
  const order = ['dark', 'light', 'auto'];
  const i = order.indexOf(state.settings.theme);
  state.settings.theme = order[(i+1) % order.length];
  applyTheme();
  save();
  render();
}
function applyTheme() {
  const r = document.documentElement;
  r.classList.remove('auto', 'dark', 'light');
  r.classList.add(state.settings.theme);
  // Update browser status bar / address bar color
  const t = state.settings.theme;
  let color = '#0c0c0b';
  if (t === 'light') color = '#fafaf9';
  else if (t === 'auto') {
    color = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? '#0c0c0b' : '#fafaf9';
  }
  const meta = document.getElementById('metaTheme');
  if (meta) meta.setAttribute('content', color);
}

function setRestDefault() {

    save(); render();

}
function setWeightStep() {
  const v = prompt('Svorio žingsnis (kg):', state.settings.weightStep);

}

function applySuggestedTargets(silent) {
  const sug = suggestedTargets();
  if (!sug) { toast('Užpildyk profilį pirma'); return; }
  if (!silent) {
    if (!confirm(`Pakeisti dabartinius tikslus į:\n\n${sug.kcal} kcal\n${sug.p}g baltymų\n${sug.c}g angliav.\n${sug.f}g riebalų\n${sug.water}ml vandens`)) return;
  }
  state.nutritionTargets = { kcal: sug.kcal, p: sug.p, c: sug.c, f: sug.f, water: sug.water };
  save();
  render();
  toast('Tikslai atnaujinti');
}

function setNutTarget(key, label, unit) {
  const cur = state.nutritionTargets[key];
  let hint = '';
  if (key === 'p') {
    const lastBw = state.bodyWeight[state.bodyWeight.length-1];
    if (lastBw) hint = `\n\nRekomenduojama jėgos sportui: ${Math.round(lastBw.weight*1.6)}–${Math.round(lastBw.weight*2.2)}g (1.6–2.2g/kg)`;
  }
  if (key === 'water') {
    const lastBw = state.bodyWeight[state.bodyWeight.length-1];
    if (lastBw) hint = `\n\nRekomenduojama: ~${Math.round(lastBw.weight*30)}ml (30ml/kg)`;
  }
  const v = prompt(`${label} (${unit}):${hint}`, cur);
  const n = parseFloat(v);
  if (n && n > 0) {
    state.nutritionTargets[key] = n;
    save(); render();
  }
}

function useTemplate(id) {
  const t = state.templates.find(x => x.id === id);
  if (!t) return;
  if (activeWorkout) {
    if (!confirm('Vyksta treniruotė. Ją reikia užbaigti pirma. Atmesti dabartinę?')) return;
    activeWorkout = null;
  }
  activeWorkout = {
    id: uid(),
    startTs: Date.now(),
    exercises: t.exerciseIds.map((eid, i) => ({
      exerciseId: eid,
      sets: Array(t.targetSets?.[i] || 3).fill(0).map(() => ({ reps: null, weight: null, done: false }))
    })),
    notes: '',
    rating: null,
    templateId: t.id
  };
  save();
  setView('today');
  toast('Treniruotė pradėta iš šablono');
}
function deleteTemplate(id) {
  if (!confirm('Trinti šabloną?')) return;

function showBackupModal(workoutSaved) {
  const daysSince = state.lastBackupTs
    ? Math.floor((Date.now() - state.lastBackupTs) / 86400000)
    : null;
  const modal = $('#backupModal');
  const title = $('#backupModalTitle');
  const msg = $('#backupModalMsg');

  title.textContent = workoutSaved ? 'Treniruotė išsaugota ✓' : 'Priminti apie eksportą';

  if (daysSince === null) {
    modal.classList.add('warn');
    msg.textContent = 'Duomenys dar niekada neeksportuoti. Eksportuok dabar — jei appsas nulūš, viskas dings.';
  } else if (daysSince >= 7) {
    modal.classList.add('warn');
    msg.textContent = `Paskutinis eksportas prieš ${daysSince} d. Rekomenduojame eksportuoti bent kartą per savaitę.`;
  } else {
    modal.classList.remove('warn');
    msg.textContent = daysSince === 0
      ? 'Eksportuota šiandien — duomenys saugūs.'
      : `Paskutinis eksportas prieš ${daysSince} d. Viskas gerai.`;
  }

  modal.classList.add('show');
}
function closeBackupModal() {
  const modal = $('#backupModal');
  modal.classList.remove('show');
  setTimeout(() => modal.classList.remove('warn'), 350);
}
function backupModalExport() {
  closeBackupModal();
  exportData();
}
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sale-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  state.lastBackupTs = Date.now();
  save();
  if (view === 'today') render();
  toast('Eksportuota');
}
function importData() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json,application/json';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result);
        if (!data.workouts || !Array.isArray(data.workouts)) throw new Error('Bad file');
        if (!confirm(`Importuoti ${data.workouts.length} treniruočių? Dabartiniai duomenys bus pakeisti.`)) return;
        state = migrateState(data); // v2.2: ta pati migracija kaip loadState — senų versijų backup'ai nebelaužo appso
        activeWorkout = state.activeWorkout || null;
        save();
        applyTheme();
        render();
        toast('Importuota');
      } catch(err) {
        toast('Klaida importuojant');
      }
    };
    r.readAsText(f);
  };
  inp.click();
}
function resetAll() {
  if (!confirm('IŠTRINTI VISKĄ? Šio veiksmo atšaukti negalima.')) return;
  if (!confirm('Tikrai? Visos treniruotės ir duomenys bus prarasti.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  activeWorkout = null;
  save();
  render();
  toast('Viskas ištrinta');
}

}
/* Refresh sheet body while preserving focus + cursor position
   (kad klaviatūra neužsidarytų rašant į paiešką) */
function refreshSheetBody(html) {
  const focused = document.activeElement;
  const focusedId = focused && focused.id;
  const cursor = (focused && (focused.tagName === 'INPUT' || focused.tagName === 'TEXTAREA'))
    ? focused.selectionStart : null;

  $('#sheetBody').innerHTML = html;

  if (focusedId) {
    const newEl = document.getElementById(focusedId);
    if (newEl && (newEl.tagName === 'INPUT' || newEl.tagName === 'TEXTAREA')) {
      newEl.focus({ preventScroll: true });
      if (cursor !== null) {
        try { newEl.setSelectionRange(cursor, cursor); } catch(e) {}
      }
    }
  }
}

function openSheetRaw() {
  $('#sheetBg').classList.add('show');
  $('#sheet').classList.add('show');
}
function closeSheet() {
  $('#sheetBg').classList.remove('show');
  $('#sheet').classList.remove('show');
  $('#sheetCancel').textContent = 'Atšaukti';
  $('#sheetCancel').onclick = closeSheet;
  sheetCtx = null;
}

// Prevent accidental data loss
window.addEventListener('beforeunload', e => {
  if (activeWorkout && activeWorkout.exercises.length > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// Register Service Worker for offline support + atnaujinimo aptikimas
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      // Periodiškai tikrinti, ar yra naujesnė versija
      setInterval(() => reg.update().catch(()=>{}), 60 * 60 * 1000); // kas valandą

      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            // Naujas SW įdiegtas, bet senas dar valdo. Parodom pranešimą.
            showUpdateBanner();
          }
        });
      });
    }).catch(err => {
      console.warn('SW registracija nepavyko:', err);
    });

    // Kai naujas SW perima valdymą — perkrauti puslapį (kad nauja versija įsigaliotų)
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  });
}

function showUpdateBanner() {
  if (document.getElementById('updateBanner')) return;
  const div = document.createElement('div');
  div.id = 'updateBanner';
  div.style.cssText = 'position:fixed; left:12px; right:12px; bottom:80px; background:var(--ink); color:var(--bg); border-radius:14px; padding:14px 16px; box-shadow:0 8px 30px rgba(0,0,0,0.35); display:flex; gap:12px; align-items:center; z-index:9999; font-size:14px;';
  div.innerHTML = `
    <div style="flex:1; min-width:0;">
      <div style="font-weight:600;">Yra nauja versija</div>
      <div style="font-size:12px; opacity:0.7; margin-top:2px;">Spauskite, kad atnaujintumėte</div>
    </div>
    <button id="updateBtn" style="background:var(--bg); color:var(--ink); border:0; padding:8px 14px; border-radius:10px; font-weight:600; font-size:13px; cursor:pointer;">Atnaujinti</button>
    <button id="updateDismiss" style="background:transparent; color:var(--bg); border:0; font-size:20px; cursor:pointer; opacity:0.7; padding:4px 6px;">×</button>
  `;
  document.body.appendChild(div);
  document.getElementById('updateBtn').onclick = () => {
    navigator.serviceWorker.getRegistration().then(reg => {
      if (reg && reg.waiting) {
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      } else {
        window.location.reload();
      }
    });
  };
  document.getElementById('updateDismiss').onclick = () => div.remove();
}
</script>
</body>
</html>
